<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dudu Studios</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  text-align: center;
}

/* GLOW FUNDO */
body::before {
  content: "";
  position: fixed;
  width: 250px;
  height: 250px;
  background: #00ffcc;
  filter: blur(120px);
  top: -100px;
  left: -100px;
  opacity: 0.2;
  animation: glowMove 6s infinite alternate;
}

@keyframes glowMove {
  from { transform: translate(0,0); }
  to { transform: translate(150px,120px); }
}

/* LOGO DE FUNDO */
.background-logo {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 500px;
  height: 500px;
  background: url('logo.png') no-repeat center;
  background-size: contain;
  transform: translate(-50%, -50%);
  opacity: 0.05;
  z-index: 0;
}

/* CONTAINER */
.container {
  max-width: 400px;
  margin: auto;
  padding: 30px 20px;
  position: relative;
  z-index: 1;
}

/* PERFIL */
.perfil img {
  width: 95px;
  height: 95px;
  border-radius: 50%;
  border: 2px solid #00ffcc;
  box-shadow: 0 0 20px #00ffcc;
}

.perfil h2 {
  margin-top: 10px;
}

.perfil p {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 25px;
}

/* BOTÕES */
.botao {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 12px 0;
  padding: 16px;
  border-radius: 14px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
  transition: 0.25s;
}

/* BRILHO */
.botao::before {
  content: "";
  position: absolute;
  width: 50%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(0,255,204,0.6), transparent);
  top: 0;
  left: -100%;
  transition: 0.5s;
}

.botao:hover::before {
  left: 100%;
}

.botao:hover {
  border: 1px solid #00ffcc;
  box-shadow: 0 0 15px #00ffcc;
  transform: scale(1.04);
}

.botao:active {
  transform: scale(0.97);
}

.icon {
  font-size: 18px;
}

.footer {
  margin-top: 25px;
  font-size: 12px;
  color: #666;
}
</style>

</head>

<body>

<div class="background-logo"></div>

<div class="container">

  <div class="perfil">
    <img src="logo.png">
    <h2>@dudustudios</h2>
    <p>Criação de sites • Design • Social Media</p>
  </div>

  <a class="botao" href="https://www.tiktok.com/@dudustudios2?_r=1&_t=ZS-954Q7qmbpLE" target="_blank">
    <span>🎬 Meu TikTok</span>
    <span class="icon">›</span>
  </a>

  <a class="botao" href="https://wa.me/5547999686095" target="_blank">
    <span>📱 Fale comigo no WhatsApp</span>
    <span class="icon">›</span>
  </a>

  <a class="botao" href="#">
    <span>🚀 Ver meus serviços</span>
    <span class="icon">›</span>
  </a>

  <div class="footer">
    © 2026 Dudu Studios
  </div>

</div>

</body>
</html>
